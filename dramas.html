<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дорамы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Меню -->
    <header class="main-header">
        <nav class="navigation">
            <div class="nav-row top-row">
                <a href="dramas.html" class="nav-link active">Дорамы</a>
                <a href="serials.html" class="nav-link">Сериалы</a>
                <a href="movies.html" class="nav-link">Фильмы</a>
                <a href="anime.html" class="nav-link">Аниме</a>
                <a href="donghua.html" class="nav-link">Дунхуа</a>
                <a href="cartoons.html" class="nav-link">Мульты</a>
            </div>
            <hr class="nav-divider">
            <div class="nav-row bottom-row">
                <a href="manhwa.html" class="nav-link">Манхвы</a>
                <a href="manhua.html" class="nav-link">Маньхуа</a>
                <a href="manga.html" class="nav-link">Манги</a>
                <a href="novels.html" class="nav-link">Новеллы</a>
            </div>
        </nav>
    </header>

    <!-- Блок контента строго по слайду Screenshot_9_2.jpg -->
    <main class="content-area">
        <div class="slide-container">
            
            <!-- Ряд 1 -->
            <div class="slide-row row-1">
                <div>По жанрам</div>
                <div>По странам</div>
                <div>По алфавиту</div>
                <div>По годам</div>
            </div>

            <!-- Ряд 2 -->
            <div class="slide-row row-2">
                <div class="search-item text-left">
                    <span class="star-search-icon">🔍✨</span> Поиск по фильтрам
                </div>
                <div class="search-item text-right" onclick="showInputBlock()">
                    Поиск по названию <span class="star-search-icon" id="inputTargetIcon">🔍✨</span>
                </div>
            </div>

            <!-- Скрытая строка, которая встанет на место надписи при клике -->
            <div class="input-hidden-row" id="searchFieldRow">
                <input type="text" class="simple-input-box" placeholder="Поиск по названию...">
            </div>

            <!-- Ряд 3 -->
            <div class="slide-row row-3">
                <div class="tag-left">ГЕТ</div>
                <div class="tag-center">ОМЕГАВЕРС</div>
                <div class="tag-right">BL</div>
            </div>

        </div>
    </main>

    <script>
        function showInputBlock() {
            // Прячем строку с текстом, показываем чистый инпут
            document.querySelector('.row-2').style.display = 'none';
            document.getElementById('searchFieldRow').style.display = 'block';
            document.querySelector('.simple-input-box').focus();
        }
    </script>

</body>
</html>
