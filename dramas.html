<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дорамы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Меню сайта -->
    <header class="main-header">
        <nav class="navigation">
            <div class="nav-row top-row">
                <a href="dramas.html" class="nav-link active">Дорамы</a>
                <a href="serials.html" class="nav-link">Сериалы</a>
                <a href="movies.html" class="nav-link">Фильмы</a>
                <a href="anime.html" class="nav-link">Аниме</a>
                <a href="donghua.html" class="nav-link">Дунхуа</a>
                <a href="cartoons.html" class="nav-link">Мульты</a>
            </div>
            <hr class="nav-divider">
            <div class="nav-row bottom-row">
                <a href="manhwa.html" class="nav-link">Манхвы</a>
                <a href="manhua.html" class="nav-link">Маньхуа</a>
                <a href="manga.html" class="nav-link">Манги</a>
                <a href="novels.html" class="nav-link">Новеллы</a>
            </div>
        </nav>
    </header>

    <!-- Основная панель как на Screenshot_9.jpg -->
    <main class="content-area">
        <div class="filter-panel">
            
            <!-- Ряд 1: Категории -->
            <div class="filter-row categories-row">
                <div class="filter-item">По жанрам</div>
                <div class="filter-item">По странам</div>
                <div class="filter-item">По алфавиту</div>
                <div class="filter-item">По годам</div>
            </div>

            <!-- Ряд 2: Поисковая зона -->
            <div class="filter-row search-row">
                <!-- Левый блок: Поиск по фильтрам -->
                <div class="search-block filter-search">
                    <div class="custom-icon-btn">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/><path d="M10 7L9 9l-2 1 2 1 1 2 1-2 2-1-2-1z" fill="#000"/></svg>
                    </div>
                    <span class="search-text-label">Поиск по фильтрам</span>
                </div>
                
                <!-- Правый блок: Поиск по названию (интерактивный) -->
                <div class="search-block title-search" id="titleSearchBlock">
                    <!-- Обычное состояние (текст + лупа) -->
                    <div class="search-trigger-wrapper" id="searchTriggerWrapper" onclick="showSearchInput()">
                        <span class="search-text-label">Поиск по названию</span>
                        <div class="custom-icon-btn">
                            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/><path d="M10 7L9 9l-2 1 2 1 1 2 1-2 2-1-2-1z" fill="#000"/></svg>
                        </div>
                    </div>
                    
                    <!-- Скрытая строка ввода, которая заменит текст при клике -->
                    <input type="text" id="targetSearchField" placeholder="Введите название..." class="slide-search-input" onblur="hideSearchInputIfEmpty()">
                </div>
            </div>

            <!-- Ряд 3: Крупные теги направлений -->
            <div class="filter-row tags-row">
                <div class="tag-bold">ГЕТ</div>
                <div class="tag-bold main-title">ОМЕГАВЕРС</div>
                <div class="tag-bold">BL</div>
            </div>

        </div>
    </main>

    <!-- Скрипт для мгновенной подмены текста на инпут -->
    <script>
        function showSearchInput() {
            document.getElementById('searchTriggerWrapper').style.display = 'none';
            const input = document.getElementById('targetSearchField');
            input.style.display = 'block';
            input.focus();
        }

        function hideSearchInputIfEmpty() {
            const input = document.getElementById('targetSearchField');
            if (input.value.trim() === "") {
                input.style.display = 'none';
                document.getElementById('searchTriggerWrapper').style.display = 'flex';
            }
        }
    </script>

</body>
</html>
